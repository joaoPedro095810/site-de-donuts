<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donuts Deliciosos</title>

<link rel="stylesheet" href="assets/css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="logo">
<img src="assets/img/donut.png" alt="donut">
</div>

<h1>
<span class="pink">Donuts</span>
<span class="orange">Deliciosos</span>
</h1>

<p>
Descubra o mundo mágico dos nossos donuts artesanais,
feitos com amor e os melhores ingredientes
</p>

<div class="buttons">

<button class="btn primary" id="explorar">
Explorar Donuts
</button>

<button class="btn secondary" id="sabores">
Ver Sabores
</button>

</div>

<div class="stats">

<div class="card">
<h2>10+</h2>
<p>Sabores</p>
</div>

<div class="card orange-card">
<h2>100%</h2>
<p>Frescos</p>
</div>

<div class="card">
<div class="stars">
⭐⭐⭐⭐⭐
</div>
<p>Qualidade</p>
</div>

</div>

</div>

<script src="assets/js/script.js"></script>

</body>
</html>
